    .hero { background: linear-gradient(135deg, #FAF5FF 0%, #FDF2F8 100%); padding: 80px 40px 100px; text-align: center; }
    .badge { display: inline-block; background: rgba(124,58,237,0.1); color: var(--purple); padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; margin-bottom: 24px; }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.15; max-width: 700px; margin: 0 auto 24px; }
    h1 span { background: linear-gradient(135deg, var(--purple), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-sub { font-size: 1.2rem; color: var(--gray); max-width: 540px; margin: 0 auto 48px; }

    .waitlist-form { background: white; border-radius: 20px; padding: 32px; max-width: 500px; margin: 0 auto; box-shadow: 0 20px 60px rgba(124,58,237,0.15); }
    .waitlist-form h3 { font-size: 1.1rem; margin-bottom: 20px; color: var(--dark); }
    .form-group { margin-bottom: 16px; }

    .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
    .submit-btn:hover { transform: translateY(-2px); }
    .form-note { font-size: 0.8rem; color: var(--gray); margin-top: 12px; text-align: center; }
    .success-msg { display: none; text-align: center; padding: 20px; }
    .success-msg .emoji { font-size: 3rem; margin-bottom: 12px; }
    .success-msg h3 { font-size: 1.3rem; color: var(--purple); margin-bottom: 8px; }
    .success-msg p { color: var(--gray); font-size: 0.95rem; }

    .counter { display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap; }
    .counter-item { text-align: center; }
    .counter-item .num { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--purple), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .counter-item .label { font-size: 0.8rem; color: var(--gray); }

    .section { padding: 80px 40px; max-width: 1100px; margin: 0 auto; }
    .section-label { text-align: center; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--purple); margin-bottom: 16px; }
    .section-title { text-align: center; font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; margin-bottom: 48px; }

    .problems { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
    .problem-card { background: #FFF7ED; border-radius: 16px; padding: 28px; border-left: 4px solid #F97316; }
    .problem-card .icon { font-size: 2rem; margin-bottom: 12px; }
    .problem-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .problem-card p { font-size: 0.9rem; color: var(--gray); }

    .how-bg { background: var(--light); padding: 80px 40px; }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 32px; max-width: 900px; margin: 0 auto; }
    .step { text-align: center; }
    .step-num { width: 56px; height: 56px; background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; margin: 0 auto 16px; }
    .step h4 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .step p { font-size: 0.875rem; color: var(--gray); }

    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
    .feature-card { border: 2px solid #F3F4F6; border-radius: 16px; padding: 28px; transition: border-color 0.2s, transform 0.2s; }
    .feature-card:hover { border-color: var(--purple); transform: translateY(-4px); }
    .feature-card .icon { font-size: 2rem; margin-bottom: 12px; }
    .feature-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .feature-card p { font-size: 0.875rem; color: var(--gray); }

    .testimonials-bg .section-title { color: white; }
    .testimonials { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; max-width: 900px; margin: 0 auto; }
    .testimonial { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 16px; padding: 28px; color: white; }
    .testimonial p { font-size: 0.95rem; margin-bottom: 16px; font-style: italic; opacity: 0.9; }
    .testimonial .author { font-size: 0.85rem; font-weight: 700; opacity: 0.8; }

    .cta-bottom { text-align: center; padding: 80px 40px; background: var(--light); }
    .cta-bottom h2 { font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; margin-bottom: 16px; }
    .cta-bottom p { color: var(--gray); margin-bottom: 32px; font-size: 1.05rem; }
    .cta-btn { display: inline-block; background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; padding: 18px 48px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; transition: transform 0.2s; }

let currentLang = 'en';

function setLang(lang, el) {
  currentLang = lang;
  const t = translations[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) {
      if (key === 'hero_title_html' || key === 'cta_sub') {
        el.innerHTML = t[key];
      } else {
        el.textContent = t[key];
      }
    }
  });

  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key]) el.placeholder = t[key];
  });
}

function scrollToForm() {
  document.getElementById('waitlist-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => document.getElementById('email-input').focus(), 600);
}

async function submitForm() {
  const email = document.getElementById('email-input').value.trim();
  const problem = document.getElementById('problem-input').value.trim();
  const btn = document.querySelector('.submit-btn');

  if (!email || !email.includes('@')) {
    document.getElementById('email-input').style.borderColor = '#EF4444';
    return;
  }

  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, problem, language: currentLang })
    });

    if (!res.ok) {
      if (res.status === 400) {
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
        return;
      }
      throw new Error('Error');
    }

    document.getElementById('form-content').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';

  } catch (e) {
    btn.disabled = false;
    btn.textContent = translations[currentLang].form_btn;
    alert('Something went wrong. Please try again.');
  }
}

// Animate counter
function animateCounter(target, duration) {
  let start = 0;
  const step = target / (duration / 16);
  const el = document.getElementById('counter');
  const timer = setInterval(() => {
    start += step;
    if (start >= target) { el.textContent = target; clearInterval(timer); return; }
    el.textContent = Math.floor(start);
  }, 16);
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) { animateCounter(47, 1500); observer.disconnect(); }
});
observer.observe(document.getElementById('counter'));

// Init
setLang('en', document.querySelectorAll('.lang-btn')[1]);
</script>
